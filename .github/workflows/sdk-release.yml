name: sdk-release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to build/release (e.g. v2.6.0). If empty, uses the current ref."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: sdk-release-${{ github.workflow }}-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build-sdk:
    name: build-sdk-full (linux / x86_64)
    runs-on: ubuntu-24.04

    env:
      BUILD_DIR: build-sdk-full
      INSTALL_DIR: install-sdk-full
      ASSET: vix-sdk-linux-x86_64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Checkout tag (manual input)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
        shell: bash
        run: |
          set -euxo pipefail
          git fetch --tags --force
          git checkout "tags/${{ github.event.inputs.tag }}"

      - name: Install deps (Linux)
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            pkg-config \
            ninja-build \
            ca-certificates \
            git \
            curl \
            unzip \
            zip \
            tar \
            nlohmann-json3-dev \
            libssl-dev \
            zlib1g-dev \
            libsqlite3-dev \
            libbrotli-dev \
            libspdlog-dev \
            libfmt-dev \
            libmysqlcppconn-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libgl1-mesa-dev \
            libgtk-3-dev

          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev || \
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev

          pkg-config --modversion gtk+-3.0
          pkg-config --modversion webkit2gtk-4.1 || pkg-config --modversion webkit2gtk-4.0

      - name: Configure SDK full
        shell: bash
        run: |
          set -euxo pipefail

          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/${INSTALL_DIR}" \
            -DVIX_ENABLE_INSTALL=ON \
            -DVIX_BUILD_EXAMPLES=OFF \
            -DVIX_BUILD_TESTS=OFF \
            -DVIX_ENABLE_WARNINGS=ON \
            -DVIX_ENABLE_HTTP_COMPRESSION=ON \
            -DVIX_ENABLE_DB=ON \
            -DVIX_DB_USE_SQLITE=ON \
            -DVIX_DB_USE_MYSQL=ON \
            -DVIX_DB_USE_POSTGRES=OFF \
            -DVIX_DB_USE_REDIS=OFF \
            -DVIX_CORE_WITH_MYSQL=OFF \
            -DVIX_ENABLE_ORM=ON \
            -DVIX_ENABLE_WEBSOCKET=ON \
            -DVIX_ENABLE_CLI=ON \
            -DVIX_ENABLE_MIDDLEWARE=ON \
            -DVIX_ENABLE_P2P=ON \
            -DVIX_ENABLE_P2P_HTTP=ON \
            -DVIX_ENABLE_CACHE=ON \
            -DVIX_ENABLE_ASYNC=ON \
            -DVIX_ENABLE_VALIDATION=ON \
            -DVIX_ENABLE_CRYPTO=ON \
            -DVIX_ENABLE_WEBRPC=ON \
            -DVIX_ENABLE_TIME=ON \
            -DVIX_ENABLE_TESTS_MODULE=ON \
            -DVIX_ENABLE_TEMPLATE=ON \
            -DVIX_ENABLE_UI=ON \
            -DVIX_ENABLE_NOTE=ON \
            -DVIX_UI_ENABLE_LINUX_WEBVIEW=ON \
            -DVIX_ENABLE_PROCESS=ON \
            -DVIX_ENABLE_THREADPOOL=ON \
            -DVIX_ENABLE_KV=ON \
            -DVIX_ENABLE_AGENT=ON \
            -DVIX_ENABLE_GAME=ON \
            -DVIX_GAME_ENABLE_SDL=ON \
            -DVIX_GAME_ENABLE_SDL_OPENGL=ON \
            -DVIX_TIME_BUILD_TESTS=OFF \
            -DVIX_TIME_BUILD_BENCH=OFF \
            -DVIX_TEMPLATE_BUILD_TESTS=OFF \
            -DVIX_TEMPLATE_BUILD_EXAMPLES=OFF \
            -DVIX_TEMPLATE_BUILD_BENCH=OFF \
            -DVIX_UI_BUILD_TESTS=OFF \
            -DVIX_UI_BUILD_EXAMPLES=OFF \
            -DVIX_UI_BUILD_BENCHMARKS=OFF \
            -DUI_BUILD_TESTS=OFF \
            -DUI_BUILD_EXAMPLES=OFF \
            -DUI_BUILD_BENCHMARKS=OFF \
            -DUI_INSTALL=OFF \
            -DVIX_NOTE_BUILD_TESTS=OFF \
            -DVIX_NOTE_BUILD_EXAMPLES=OFF \
            -DVIX_NOTE_INSTALL=OFF \
            -DVIX_AGENT_BUILD_TESTS=OFF \
            -DVIX_AGENT_BUILD_EXAMPLES=OFF \
            -DVIX_GAME_BUILD_TESTS=OFF \
            -DVIX_GAME_BUILD_EXAMPLES=OFF \
            -DVIX_WEBSOCKET_BUILD_TESTS=OFF \
            -DVIX_WEBSOCKET_BUILD_EXAMPLES=OFF

      - name: Build SDK
        shell: bash
        run: |
          set -euxo pipefail
          cmake --build "$BUILD_DIR" -j2

      - name: Install SDK
        shell: bash
        run: |
          set -euxo pipefail
          cmake --install "$BUILD_DIR"

      - name: Normalize vendored Asio headers
        shell: bash
        run: |
          set -euxo pipefail

          ASIO_INCLUDE_DIR="third_party/asio-src/asio/include"

          test -d "$ASIO_INCLUDE_DIR/asio"
          test -f "$ASIO_INCLUDE_DIR/asio.hpp"

          mkdir -p "$INSTALL_DIR/include"
          mkdir -p "$INSTALL_DIR/include/vix/third_party/asio"

          cp -a "$ASIO_INCLUDE_DIR/asio" "$INSTALL_DIR/include/"
          cp -a "$ASIO_INCLUDE_DIR/asio.hpp" "$INSTALL_DIR/include/"

          cp -a "$ASIO_INCLUDE_DIR/asio" "$INSTALL_DIR/include/vix/third_party/asio/"
          cp -a "$ASIO_INCLUDE_DIR/asio.hpp" "$INSTALL_DIR/include/vix/third_party/asio/"

          test -f "$INSTALL_DIR/include/asio/io_context.hpp"
          test -f "$INSTALL_DIR/include/asio.hpp"
          test -f "$INSTALL_DIR/include/vix/third_party/asio/asio/io_context.hpp"
          test -f "$INSTALL_DIR/include/vix/third_party/asio/asio.hpp"

      - name: Verify installed SDK tree
        shell: bash
        run: |
          set -euxo pipefail

          test -d "$INSTALL_DIR"

          test -f "$INSTALL_DIR/bin/vix"

          test -f "$INSTALL_DIR/include/vix.hpp"
          test -f "$INSTALL_DIR/include/vix/core.hpp"
          test -f "$INSTALL_DIR/include/vix/json/Simple.hpp"
          test -f "$INSTALL_DIR/include/vix/error/Error.hpp"
          test -f "$INSTALL_DIR/include/vix/path/Path.hpp"
          test -f "$INSTALL_DIR/include/vix/fs.hpp"
          test -f "$INSTALL_DIR/include/vix/console.hpp"
          test -f "$INSTALL_DIR/include/vix/env.hpp"
          test -f "$INSTALL_DIR/include/vix/log.hpp"
          test -f "$INSTALL_DIR/include/vix/async.hpp"
          test -f "$INSTALL_DIR/include/vix/time.hpp"
          test -f "$INSTALL_DIR/include/vix/crypto.hpp"
          test -f "$INSTALL_DIR/include/vix/cache.hpp"
          test -f "$INSTALL_DIR/include/vix/db.hpp"
          test -f "$INSTALL_DIR/include/vix/orm.hpp"
          test -f "$INSTALL_DIR/include/vix/websocket.hpp"
          test -f "$INSTALL_DIR/include/vix/validation.hpp"
          test -f "$INSTALL_DIR/include/vix/process.hpp"
          test -f "$INSTALL_DIR/include/vix/threadpool.hpp"
          test -f "$INSTALL_DIR/include/vix/kv.hpp"
          test -f "$INSTALL_DIR/include/vix/template.hpp"
          test -f "$INSTALL_DIR/include/vix/ui.hpp"
          test -f "$INSTALL_DIR/include/vix/note/note.hpp"
          test -f "$INSTALL_DIR/include/vix/p2p.hpp"
          test -f "$INSTALL_DIR/include/vix/p2p_http.hpp"
          test -f "$INSTALL_DIR/include/vix/webrpc.hpp"
          test -f "$INSTALL_DIR/include/vix/game.hpp"
          test -f "$INSTALL_DIR/include/vix/agent.hpp"

          test -d "$INSTALL_DIR/include/vix/ui"
          test -d "$INSTALL_DIR/include/vix/note"
          test -f "$INSTALL_DIR/include/vix/ui/assets/AssetManager.hpp"

          test -f "$INSTALL_DIR/include/asio/io_context.hpp"
          test -f "$INSTALL_DIR/include/asio.hpp"
          test -f "$INSTALL_DIR/include/vix/third_party/asio/asio/io_context.hpp"
          test -f "$INSTALL_DIR/include/vix/third_party/asio/asio.hpp"

          test -f "$INSTALL_DIR/lib/cmake/Vix/VixConfig.cmake"
          test -f "$INSTALL_DIR/lib/cmake/Vix/VixConfigVersion.cmake"
          test -f "$INSTALL_DIR/lib/cmake/Vix/VixTargets.cmake"

          test -f "$INSTALL_DIR/lib/libvix_error.a"
          test -f "$INSTALL_DIR/lib/libvix_path.a"
          test -f "$INSTALL_DIR/lib/libvix_fs.a"
          test -f "$INSTALL_DIR/lib/libvix_io.a"
          test -f "$INSTALL_DIR/lib/libvix_env.a"
          test -f "$INSTALL_DIR/lib/libvix_os.a"
          test -f "$INSTALL_DIR/lib/libvix_utils.a"
          test -f "$INSTALL_DIR/lib/libvix_log.a"
          test -f "$INSTALL_DIR/lib/libvix_core.a"
          test -f "$INSTALL_DIR/lib/libvix_websocket.a"
          test -f "$INSTALL_DIR/lib/libvix_async.a"
          test -f "$INSTALL_DIR/lib/libvix_threadpool.a"
          test -f "$INSTALL_DIR/lib/libvix_kv.a"
          test -f "$INSTALL_DIR/lib/libvix_cache.a"
          test -f "$INSTALL_DIR/lib/libvix_process.a"
          test -f "$INSTALL_DIR/lib/libvix_crypto.a"
          test -f "$INSTALL_DIR/lib/libvix_net.a"
          test -f "$INSTALL_DIR/lib/libvix_sync.a"
          test -f "$INSTALL_DIR/lib/libvix_p2p.a"
          test -f "$INSTALL_DIR/lib/libvix_p2p_http.a"
          test -f "$INSTALL_DIR/lib/libvix_middleware.a"
          test -f "$INSTALL_DIR/lib/libui.a"
          test -f "$INSTALL_DIR/lib/libvix_note.a"

          nm -C "$INSTALL_DIR/lib/libvix_websocket.a" | grep "vix::websocket::LowLevelServer::run"
          nm -C "$INSTALL_DIR/lib/libvix_websocket.a" | grep "vix::websocket::Session::shutdown_now"
          nm -C "$INSTALL_DIR/lib/libvix_websocket.a" | grep "vix::websocket::LongPollingManager::push_to"

          grep -R "vix::websocket" "$INSTALL_DIR/lib/cmake/Vix" -n
          grep -R "libvix_websocket" "$INSTALL_DIR/lib/cmake/Vix" -n
          grep -R "vix::ui" "$INSTALL_DIR/lib/cmake/Vix" -n
          grep -R "libui" "$INSTALL_DIR/lib/cmake/Vix" -n
          grep -R "vix::note" "$INSTALL_DIR/lib/cmake/Vix" -n
          grep -R "libvix_note" "$INSTALL_DIR/lib/cmake/Vix" -n

          find "$INSTALL_DIR/include" -maxdepth 5 -type f | sort > installed-headers.txt
          find "$INSTALL_DIR/lib" -maxdepth 2 -type f | sort > installed-libs.txt
          find "$INSTALL_DIR/lib/cmake" -maxdepth 5 -type f | sort > installed-cmake-files.txt

          sed -n '1,180p' installed-headers.txt
          cat installed-libs.txt
          cat installed-cmake-files.txt

      - name: Package SDK
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p dist
          tar -C "$INSTALL_DIR" -czf "dist/$ASSET" .

          ls -lah dist

      - name: Validate packaged SDK binary
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf smoke-bin
          mkdir -p smoke-bin

          tar -xzf "dist/$ASSET" -C smoke-bin

          test -f smoke-bin/bin/vix
          file smoke-bin/bin/vix
          ldd smoke-bin/bin/vix || true
          smoke-bin/bin/vix --version

      - name: Validate packaged SDK tree
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf smoke-sdk-tree
          mkdir -p smoke-sdk-tree

          tar -xzf "dist/$ASSET" -C smoke-sdk-tree

          test -f smoke-sdk-tree/bin/vix
          test -f smoke-sdk-tree/include/vix.hpp
          test -f smoke-sdk-tree/include/vix/websocket.hpp
          test -f smoke-sdk-tree/include/vix/ui.hpp
          test -f smoke-sdk-tree/include/vix/note/note.hpp
          test -f smoke-sdk-tree/lib/libvix_websocket.a
          test -f smoke-sdk-tree/lib/libui.a
          test -f smoke-sdk-tree/lib/libvix_note.a
          test -f smoke-sdk-tree/lib/cmake/Vix/VixConfig.cmake
          test -f smoke-sdk-tree/lib/cmake/Vix/VixTargets.cmake

          nm -C smoke-sdk-tree/lib/libvix_websocket.a | grep "vix::websocket::LowLevelServer::run"
          nm -C smoke-sdk-tree/lib/libvix_websocket.a | grep "vix::websocket::Session::shutdown_now"
          nm -C smoke-sdk-tree/lib/libvix_websocket.a | grep "vix::websocket::LongPollingManager::push_to"

      - name: Validate packaged SDK with full consumer project
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf smoke-sdk consumer
          mkdir -p smoke-sdk consumer

          tar -xzf "dist/$ASSET" -C smoke-sdk

          cat > consumer/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(vix_sdk_consumer LANGUAGES CXX)

          set(CMAKE_CXX_STANDARD 20)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(CMAKE_CXX_EXTENSIONS OFF)

          find_package(Vix CONFIG REQUIRED)

          add_executable(app main.cpp)
          target_link_libraries(app PRIVATE vix::vix)
          EOF

          cat > consumer/main.cpp <<'EOF'
          #include <vix.hpp>

          #include <vix/json/Simple.hpp>
          #include <vix/error/Error.hpp>
          #include <vix/path/Path.hpp>
          #include <vix/fs.hpp>
          #include <vix/console.hpp>
          #include <vix/env.hpp>
          #include <vix/log.hpp>
          #include <vix/core.hpp>
          #include <vix/async.hpp>
          #include <vix/time.hpp>
          #include <vix/crypto.hpp>
          #include <vix/cache.hpp>
          #include <vix/db.hpp>
          #include <vix/orm.hpp>
          #include <vix/websocket.hpp>
          #include <vix/validation.hpp>
          #include <vix/process.hpp>
          #include <vix/threadpool.hpp>
          #include <vix/kv.hpp>
          #include <vix/template.hpp>
          #include <vix/ui.hpp>
          #include <vix/note/note.hpp>
          #include <vix/p2p.hpp>
          #include <vix/p2p_http.hpp>
          #include <vix/webrpc.hpp>
          #include <vix/game.hpp>
          #include <vix/agent.hpp>

          #include <iostream>
          #include <string>

          int main()
          {
            vix::websocket::Config ws_config{};
            vix::websocket::Router ws_router{};

            vix::ui::ViewContext view_context{};

            (void)ws_config;
            (void)ws_router;
            (void)view_context;

            std::cout << "Vix full SDK consumer build and link works\n";
            return 0;
          }
          EOF

          cmake -S consumer -B consumer/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/smoke-sdk"

          cmake --build consumer/build -j2

          ./consumer/build/app

      - name: Validate packaged SDK with WebSocket link project
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf smoke-sdk-ws consumer-ws
          mkdir -p smoke-sdk-ws consumer-ws

          tar -xzf "dist/$ASSET" -C smoke-sdk-ws

          cat > consumer-ws/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(vix_sdk_websocket_consumer LANGUAGES CXX)

          set(CMAKE_CXX_STANDARD 20)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(CMAKE_CXX_EXTENSIONS OFF)

          find_package(Vix CONFIG REQUIRED)

          add_executable(app main.cpp)
          target_link_libraries(app PRIVATE vix::vix)
          EOF

          cat > consumer-ws/main.cpp <<'EOF'
          #include <vix/websocket.hpp>

          #include <iostream>

          int main()
          {
            vix::websocket::Config config{};
            vix::websocket::Router router{};

            (void)config;
            (void)router;

            std::cout << "Vix WebSocket SDK link works\n";
            return 0;
          }
          EOF

          cmake -S consumer-ws -B consumer-ws/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/smoke-sdk-ws"

          cmake --build consumer-ws/build -j2

          ./consumer-ws/build/app

      - name: Validate packaged SDK with UI link project
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf smoke-sdk-ui consumer-ui
          mkdir -p smoke-sdk-ui consumer-ui

          tar -xzf "dist/$ASSET" -C smoke-sdk-ui

          cat > consumer-ui/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(vix_sdk_ui_consumer LANGUAGES CXX)

          set(CMAKE_CXX_STANDARD 20)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(CMAKE_CXX_EXTENSIONS OFF)

          find_package(Vix CONFIG REQUIRED)

          add_executable(app main.cpp)
          target_link_libraries(app PRIVATE vix::vix)
          EOF

          cat > consumer-ui/main.cpp <<'EOF'
          #include <vix/ui.hpp>

          #include <iostream>

          int main()
          {
            vix::ui::ViewContext context{};

            (void)context;

            std::cout << "Vix UI SDK link works\n";
            return 0;
          }
          EOF

          cmake -S consumer-ui -B consumer-ui/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/smoke-sdk-ui"

          cmake --build consumer-ui/build -j2

          ./consumer-ui/build/app

      - name: Validate packaged SDK with Note link project
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf smoke-sdk-note consumer-note
          mkdir -p smoke-sdk-note consumer-note

          tar -xzf "dist/$ASSET" -C smoke-sdk-note

          cat > consumer-note/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(vix_sdk_note_consumer LANGUAGES CXX)

          set(CMAKE_CXX_STANDARD 20)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(CMAKE_CXX_EXTENSIONS OFF)

          find_package(Vix CONFIG REQUIRED)

          add_executable(app main.cpp)
          target_link_libraries(app PRIVATE vix::vix)
          EOF

          cat > consumer-note/main.cpp <<'EOF'
          #include <vix/note/note.hpp>

          #include <iostream>

          int main()
          {
            std::cout << "Vix Note SDK link works\n";
            return 0;
          }
          EOF

          cmake -S consumer-note -B consumer-note/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/smoke-sdk-note"

          cmake --build consumer-note/build -j2

          ./consumer-note/build/app

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist-linux-x86_64
          path: dist/*
          if-no-files-found: error

  build-sdk-windows:
    name: build-sdk-full (windows / x86_64)
    runs-on: windows-2022

    env:
      BUILD_DIR: build-sdk-full
      INSTALL_DIR: install-sdk-full
      ASSET: vix-sdk-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Checkout tag (manual input)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
        shell: pwsh
        run: |
          git fetch --tags --force
          git checkout "tags/${{ github.event.inputs.tag }}"

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg $env:GITHUB_WORKSPACE\vcpkg
          "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
          cd $env:GITHUB_WORKSPACE\vcpkg
          .\bootstrap-vcpkg.bat

      - name: Vcpkg install
        shell: pwsh
        run: |
          cd $env:GITHUB_WORKSPACE
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet x64-windows --x-manifest-root "$env:GITHUB_WORKSPACE"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Configure SDK full
        shell: pwsh
        run: |
          cmake -S . -B "$env:BUILD_DIR" -A x64 `
            -DCMAKE_INSTALL_PREFIX="$env:GITHUB_WORKSPACE\$env:INSTALL_DIR" `
            -DVIX_ENABLE_INSTALL=ON `
            -DVIX_BUILD_EXAMPLES=OFF `
            -DVIX_BUILD_TESTS=OFF `
            -DVIX_ENABLE_WARNINGS=ON `
            -DVIX_ENABLE_HTTP_COMPRESSION=OFF `
            -DVIX_ENABLE_DB=ON `
            -DVIX_DB_USE_SQLITE=ON `
            -DVIX_DB_USE_MYSQL=OFF `
            -DVIX_DB_USE_POSTGRES=OFF `
            -DVIX_DB_USE_REDIS=OFF `
            -DVIX_CORE_WITH_MYSQL=OFF `
            -DVIX_ENABLE_ORM=ON `
            -DVIX_ENABLE_WEBSOCKET=ON `
            -DVIX_ENABLE_CLI=ON `
            -DVIX_ENABLE_MIDDLEWARE=ON `
            -DVIX_ENABLE_P2P=ON `
            -DVIX_ENABLE_P2P_HTTP=ON `
            -DVIX_ENABLE_CACHE=ON `
            -DVIX_ENABLE_ASYNC=ON `
            -DVIX_ENABLE_VALIDATION=ON `
            -DVIX_ENABLE_CRYPTO=ON `
            -DVIX_ENABLE_WEBRPC=ON `
            -DVIX_ENABLE_TIME=ON `
            -DVIX_ENABLE_TESTS_MODULE=ON `
            -DVIX_ENABLE_TEMPLATE=ON `
            -DVIX_ENABLE_UI=ON `
            -DVIX_ENABLE_NOTE=ON `
            -DVIX_UI_ENABLE_LINUX_WEBVIEW=OFF `
            -DVIX_ENABLE_PROCESS=ON `
            -DVIX_ENABLE_THREADPOOL=ON `
            -DVIX_ENABLE_KV=ON `
            -DVIX_ENABLE_AGENT=ON `
            -DVIX_ENABLE_GAME=OFF `
            -DVIX_UI_BUILD_TESTS=OFF `
            -DVIX_UI_BUILD_EXAMPLES=OFF `
            -DVIX_UI_BUILD_BENCHMARKS=OFF `
            -DUI_BUILD_TESTS=OFF `
            -DUI_BUILD_EXAMPLES=OFF `
            -DUI_BUILD_BENCHMARKS=OFF `
            -DUI_INSTALL=OFF `
            -DVIX_NOTE_BUILD_TESTS=OFF `
            -DVIX_NOTE_BUILD_EXAMPLES=OFF `
            -DVIX_NOTE_INSTALL=OFF `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build SDK
        shell: pwsh
        run: |
          cmake --build "$env:BUILD_DIR" --config Release
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Install SDK
        shell: pwsh
        run: |
          cmake --install "$env:BUILD_DIR" --config Release
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Bundle SQLite runtime DLL
        shell: pwsh
        run: |
          $sqliteDll = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\vcpkg\installed\x64-windows" -Recurse -File -Filter "sqlite3.dll" |
            Select-Object -First 1

          if (-not $sqliteDll) {
            throw "sqlite3.dll not found in vcpkg installed tree"
          }

          New-Item -ItemType Directory -Force -Path "$env:INSTALL_DIR\bin" | Out-Null
          Copy-Item -LiteralPath $sqliteDll.FullName -Destination "$env:INSTALL_DIR\bin\sqlite3.dll" -Force

          if (!(Test-Path "$env:INSTALL_DIR\bin\sqlite3.dll")) {
            throw "failed to copy sqlite3.dll into SDK bin directory"
          }

          Write-Host "Bundled sqlite3.dll from $($sqliteDll.FullName)"

      - name: Verify installed SDK tree
        shell: pwsh
        run: |
          if (!(Test-Path "$env:INSTALL_DIR\bin\vix.exe")) { throw "missing bin\vix.exe" }
          if (!(Test-Path "$env:INSTALL_DIR\bin\sqlite3.dll")) { throw "missing bin\sqlite3.dll" }
          if (!(Test-Path "$env:INSTALL_DIR\include\vix.hpp")) { throw "missing include\vix.hpp" }
          if (!(Test-Path "$env:INSTALL_DIR\include\vix\websocket.hpp")) { throw "missing include\vix\websocket.hpp" }
          if (!(Test-Path "$env:INSTALL_DIR\include\vix\ui.hpp")) { throw "missing include\vix\ui.hpp" }
          if (!(Test-Path "$env:INSTALL_DIR\include\vix\note\note.hpp")) { throw "missing include\vix\note\note.hpp" }
          if (!(Test-Path "$env:INSTALL_DIR\include\vix\ui\assets\AssetManager.hpp")) { throw "missing include\vix\ui\assets\AssetManager.hpp" }
          if (!(Test-Path "$env:INSTALL_DIR\lib\cmake\Vix\VixConfig.cmake")) { throw "missing VixConfig.cmake" }
          if (!(Test-Path "$env:INSTALL_DIR\lib\cmake\Vix\VixTargets.cmake")) { throw "missing VixTargets.cmake" }

          & "$env:INSTALL_DIR\bin\vix.exe" --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package SDK
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "$env:INSTALL_DIR\*" -DestinationPath "dist\$env:ASSET" -Force
          if (!(Test-Path "dist\$env:ASSET")) { throw "missing SDK archive" }

      - name: Validate packaged SDK
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force smoke-sdk -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path smoke-sdk | Out-Null

          Expand-Archive -LiteralPath "dist\$env:ASSET" -DestinationPath smoke-sdk -Force

          if (!(Test-Path "smoke-sdk\bin\vix.exe")) { throw "archive missing bin\vix.exe" }
          if (!(Test-Path "smoke-sdk\bin\sqlite3.dll")) { throw "archive missing bin\sqlite3.dll" }
          if (!(Test-Path "smoke-sdk\include\vix.hpp")) { throw "archive missing include\vix.hpp" }
          if (!(Test-Path "smoke-sdk\include\vix\ui.hpp")) { throw "archive missing include\vix\ui.hpp" }
          if (!(Test-Path "smoke-sdk\include\vix\note\note.hpp")) { throw "archive missing include\vix\note\note.hpp" }
          if (!(Test-Path "smoke-sdk\lib\cmake\Vix\VixConfig.cmake")) { throw "archive missing VixConfig.cmake" }

          & "smoke-sdk\bin\vix.exe" --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist-windows-x86_64
          path: dist/*
          if-no-files-found: error

  publish-sdk:
    name: publish-sdk
    needs:
      - build-sdk
      - build-sdk-windows
    runs-on: ubuntu-24.04

    steps:
      - name: Download SDK artifact
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Flatten SDK assets
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p dist

          find dist-all -type f -name "vix-sdk-linux-x86_64.tar.gz" -exec cp -f {} dist/ \;
          find dist-all -type f -name "vix-sdk-windows-x86_64.zip" -exec cp -f {} dist/ \;

          test -f dist/vix-sdk-linux-x86_64.tar.gz
          test -f dist/vix-sdk-windows-x86_64.zip

          ls -lah dist

      - name: Generate sha256 files
        shell: bash
        run: |
          set -euxo pipefail

          cd dist

          for f in vix-sdk-*.tar.gz vix-sdk-*.zip; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
          done

          ls -lah

      - name: Sign SDK assets
        shell: bash
        env:
          MINISIGN_PRIVATE_KEY_B64: ${{ secrets.MINISIGN_PRIVATE_KEY_B64 }}
        run: |
          set -euxo pipefail

          if [ -z "${MINISIGN_PRIVATE_KEY_B64:-}" ]; then
            echo "MINISIGN_PRIVATE_KEY_B64 is not configured; skipping minisign signing."
            exit 0
          fi

          cd dist

          MS_VER="0.11"
          curl -fL --retry 10 --retry-delay 2 \
            -o minisign-linux.tar.gz \
            "https://github.com/jedisct1/minisign/releases/download/${MS_VER}/minisign-${MS_VER}-linux.tar.gz"

          tar -xzf minisign-linux.tar.gz
          chmod +x minisign-linux/x86_64/minisign
          MS="./minisign-linux/x86_64/minisign"

          keyfile="$(mktemp)"
          chmod 600 "$keyfile"
          printf "%s" "$MINISIGN_PRIVATE_KEY_B64" | base64 -d > "$keyfile"
          test -s "$keyfile"

          for f in vix-sdk-*.tar.gz vix-sdk-*.zip; do
            [ -f "$f" ] || continue
            "$MS" -S -s "$keyfile" -m "$f"
          done

          rm -f "$keyfile"
          rm -rf minisign-linux minisign-linux.tar.gz

          ls -lah

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          set -euxo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SDK assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*
