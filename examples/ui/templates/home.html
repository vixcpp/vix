<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }}</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 40px;
        background: #0f172a;
        color: #f8fafc;
      }

      .card {
        max-width: 720px;
        padding: 28px;
        border: 1px solid #334155;
        border-radius: 16px;
        background: #111827;
      }

      h1 {
        margin-top: 0;
        color: #38bdf8;
      }

      code {
        background: #020617;
        padding: 3px 6px;
        border-radius: 6px;
      }

      a {
        color: #38bdf8;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>{{ page_title }}</h1>

      <p>Hello {{ name }}.</p>

      <p>
        This page is rendered with <code>vix::ui::View</code> and returned with
        <code>res.ui(view)</code>.
      </p>

      <p>
        Framework: <strong>{{ framework }}</strong><br />
        Module: <strong>{{ module }}</strong>
      </p>

      <p><a href="/">Home</a> · <a href="/about">About</a></p>
    </main>
  </body>
</html>
