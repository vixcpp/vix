<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }}</title>

    {{ assets | safe }}

    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e5e7eb;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 56px 24px;
      }

      .hero {
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        background: linear-gradient(
          135deg,
          rgba(243, 119, 38, 0.18),
          rgba(59, 130, 246, 0.12)
        );
      }

      h1 {
        margin: 0 0 12px;
        font-size: 38px;
        color: #ffffff;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        font-size: 18px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-top: 24px;
      }

      article {
        padding: 24px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      article strong {
        display: block;
        font-size: 34px;
        color: #ffffff;
      }

      article span {
        color: #94a3b8;
      }

      .flash,
      .toast {
        margin: 16px 0;
        padding: 14px 16px;
        border-radius: 14px;
      }

      .flash {
        background: rgba(34, 197, 94, 0.14);
        border: 1px solid rgba(34, 197, 94, 0.3);
      }

      .toast {
        background: rgba(59, 130, 246, 0.14);
        border: 1px solid rgba(59, 130, 246, 0.3);
      }

      @media (max-width: 700px) {
        .stats {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <main>
      <section class="hero">
        <h1>{{ page_title }}</h1>
        <p>
          {{ framework }} server-rendered dashboard powered by {{ module }}.
        </p>
      </section>

      {{ flash | safe }} {{ stats | safe }} {{ toast | safe }}
    </main>
  </body>
</html>
