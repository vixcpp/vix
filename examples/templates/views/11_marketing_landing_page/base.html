<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{ page_title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #f8fafc;
    }

    .container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    .hero {
      padding: 56px 0 24px 0;
    }

    .hero h1 {
      font-size: 52px;
      line-height: 1.1;
      margin-top: 0;
      margin-bottom: 18px;
      max-width: 760px;
    }

    .hero p {
      color: #cbd5e1;
      font-size: 18px;
      line-height: 1.8;
      max-width: 760px;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      margin-right: 12px;
      margin-bottom: 12px;
    }

    .btn-primary {
      background: #6366f1;
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 18px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .muted {
      color: #94a3b8;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .section-title {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 28px;
    }

    @media (max-width: 900px) {
      .hero h1 {
        font-size: 38px;
      }

      .stats,
      .feature-grid,
      .pricing-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  {% include "header.html" %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
