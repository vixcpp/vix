<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{ page_title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      margin-bottom: 24px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
    }

    .sidebar-link {
      display: block;
      text-decoration: none;
      color: #334155;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .sidebar-link.active {
      background: #e0e7ff;
      color: #312e81;
      font-weight: bold;
    }

    .muted {
      color: #64748b;
    }

    .stat-value {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge.green {
      background: #dcfce7;
      color: #166534;
    }

    .badge.yellow {
      background: #fef9c3;
      color: #854d0e;
    }

    .badge.red {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge.gray {
      background: #e2e8f0;
      color: #334155;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      text-align: left;
      padding: 14px 10px;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: top;
    }

    th {
      font-size: 14px;
      color: #475569;
    }

    .section-title {
      margin-top: 0;
      margin-bottom: 16px;
    }

    @media (max-width: 1024px) {
      .layout,
      .content-grid,
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  {% include "header.html" %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
