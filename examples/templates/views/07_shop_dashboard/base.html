<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{ page_title }}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #222;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 8px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      background: #e8f5e9;
      color: #2e7d32;
    }

    .badge.closed {
      background: #ffebee;
      color: #c62828;
    }

    .alert-list li,
    .order-list li {
      margin-bottom: 10px;
    }

    .muted {
      color: #666;
    }

    @media (max-width: 768px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  {% include "header.html" %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
