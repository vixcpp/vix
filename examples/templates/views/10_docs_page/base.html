<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{ page_title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      margin-bottom: 24px;
    }

    .sidebar-link {
      display: block;
      text-decoration: none;
      color: #334155;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .sidebar-link.active {
      background: #e0e7ff;
      color: #312e81;
      font-weight: bold;
    }

    .muted {
      color: #64748b;
    }

    .code-block {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 14px;
      padding: 18px;
      overflow-x: auto;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .section-title {
      margin-top: 0;
      margin-bottom: 16px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  {% include "header.html" %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
