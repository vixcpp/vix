<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{ page_title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f8fb;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      margin-bottom: 24px;
    }

    .muted {
      color: #6b7280;
    }

    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .post-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .post-card h3 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 20px;
      line-height: 1.3;
    }

    .post-card p {
      margin-top: 0;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .meta {
      font-size: 14px;
      color: #6b7280;
    }

    @media (max-width: 900px) {
      .post-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  {% include "header.html" %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
